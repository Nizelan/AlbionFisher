# AlbionFisher shipped defaults. Do not edit — override in config/settings.yaml.

detection:
  model_path: model/albionfisher.pt
  conf_threshold: 0.5
  idle_fps: 3        # detection FPS outside the minigame (SPEC §7: 2–5 is enough)
  minigame_fps: 20   # detection FPS during the minigame (SPEC §5: target 20–30)

timeouts:            # seconds
  find_zone: 10.0    # no fishing_zone found -> report + retry
  cast_confirm: 5.0  # bobber_idle must appear after a cast
  bite: 30.0         # waiting for bobber_bite before recasting
  minigame_start: 3.0  # minigame_bar must appear after hooking

minigame:
  deadzone_frac: 0.08    # fraction of zone width around its center: no action inside
  hysteresis_frac: 0.04  # extra margin before flipping hold/release (anti-jitter)

cast:
  hold_ms: 600       # LMB hold duration = cast strength

stop:
  max_consecutive_fails: 5
  session_limit: null  # max fish per session; null = unlimited
